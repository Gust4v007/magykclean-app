// ─── HELPERS ─────────────────────────────────────────────────────────────────

function genId() { return "MK" + String(Math.floor(Math.random() * 9000) + 1000); }

function fmtCPF(v) {
  return v.replace(/\D/g, "").slice(0, 11)
    .replace(/(\d{3})(\d)/, "$1.$2")
    .replace(/(\d{3})(\d)/, "$1.$2")
    .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
}
function fmtPhone(v) {
  return v.replace(/\D/g, "").slice(0, 11)
    .replace(/(\d{2})(\d)/, "($1) $2")
    .replace(/(\d{5})(\d{1,4})$/, "$1-$2");
}
function fmtCEP(v) {
  return v.replace(/\D/g, "").slice(0, 8).replace(/(\d{5})(\d{1,3})$/, "$1-$2");
}
function validCPF(cpf) {
  const c = cpf.replace(/\D/g, "");
  if (c.length !== 11 || /^(\d)\1+$/.test(c)) return false;
  let s = 0; for (let i = 0; i < 9; i++) s += +c[i] * (10 - i);
  let r = (s * 10) % 11; if (r >= 10) r = 0; if (r !== +c[9]) return false;
  s = 0; for (let i = 0; i < 10; i++) s += +c[i] * (11 - i);
  r = (s * 10) % 11; if (r >= 10) r = 0; return r === +c[10];
}
function validEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

// ─── DB ───────────────────────────────────────────────────────────────────────

async function dbGet(key) {
  try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }
  catch { return null; }
}
async function dbSet(key, val) {
  try { await window.storage.set(key, JSON.stringify(val)); } catch {}
}

// ─── LOGIN FORM ───────────────────────────────────────────────────────────────

function LoginForm({ clients, onSuccess, onGoRegister, justRegistered, regEmail, onGoAdmin }) {
  const [email, setEmail]       = useState(regEmail || "");
  const [password, setPassword] = useState("");
  const [showPass, setShowPass] = useState(false);
  const [error, setError]       = useState("");
  const [loading, setLoading]   = useState(false);
  const [tapCount, setTapCount] = useState(0);

  // Secret: tap the logo 7x to go to admin
  function handleLogoTap() {
    const next = tapCount + 1;
    setTapCount(next);
    if (next >= 7) { setTapCount(0); onGoAdmin(); }
  }

  function submit() {
    if (!email || !password) { setError("Preencha e-mail e senha."); return; }
    setLoading(true);
    setTimeout(() => {
      const match = (clients || []).find(c => c.email.trim().toLowerCase() === email.trim().toLowerCase());
      if (!match)                    { setError("E-mail não encontrado. Crie uma conta."); setLoading(false); return; }
      if (match.password !== password) { setError("Senha incorreta. Tente novamente.");   setLoading(false); return; }
      onSuccess(match);
    }, 500);
  }

  const inp = {
    width: "100%", padding: "12px 14px", borderRadius: 10, boxSizing: "border-box",
    border: "1.5px solid rgba(255,255,255,0.15)",
    background: "rgba(255,255,255,0.07)", color: "#fff",
    fontSize: 14, fontFamily: "inherit", outline: "none",
  };
  const lbl = { fontSize: 11, fontWeight: 700, color: "#64748B", letterSpacing: 0.5, display: "block", marginBottom: 4 };

  return (
    <div style={{
      minHeight: "100vh", background: "linear-gradient(135deg,#0C0F1A 0%,#0E2440 100%)",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      padding: "40px 20px", fontFamily: "'Syne',sans-serif",
    }}>
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <div style={{ fontSize: 38, marginBottom: 6, cursor: "default", userSelect: "none" }} onClick={handleLogoTap}>👟✨</div>
        <h1 style={{ fontSize: 32, fontWeight: 800, color: "#fff", margin: 0, letterSpacing: -1 }}>
          <span style={{ color: "#22D3EE" }}>Magyk</span>Clean
        </h1>
        <p style={{ color: "#94A3B8", margin: "4px 0 0", fontSize: 13 }}>Lavanderia Premium de Tênis</p>
      </div>

      <div style={{
        background: "rgba(255,255,255,0.05)", backdropFilter: "blur(10px)",
        borderRadius: 24, padding: 32, width: "100%", maxWidth: 400,
        border: "1px solid rgba(255,255,255,0.1)",
      }}>
        {justRegistered && (
          <div style={{
            background: "rgba(16,185,129,0.12)", border: "1px solid rgba(16,185,129,0.35)",
            borderRadius: 12, padding: "12px 16px", marginBottom: 20,
            display: "flex", alignItems: "center", gap: 10,
          }}>
            <span style={{ fontSize: 20 }}>🎉</span>
            <div>
              <div style={{ color: "#10B981", fontWeight: 700, fontSize: 14 }}>Cadastro realizado com sucesso!</div>
              <div style={{ color: "#6EE7B7", fontSize: 12, marginTop: 2 }}>Agora faça login para continuar</div>
            </div>
          </div>
        )}

        <h2 style={{ color: "#fff", fontSize: 22, fontWeight: 800, margin: "0 0 4px" }}>
          {justRegistered ? "Acesse sua conta" : "Bem-vindo de volta!"}
        </h2>
        <p style={{ color: "#64748B", fontSize: 13, margin: "0 0 22px" }}>Entre com seu e-mail e senha</p>

        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div>
            <label style={lbl}>E-MAIL</label>
            <input style={inp} type="email" placeholder="seu@email.com"
              value={email} onChange={e => { setEmail(e.target.value); setError(""); }} />
          </div>
          <div>
            <label style={lbl}>SENHA</label>
            <div style={{ position: "relative" }}>
              <input style={{ ...inp, paddingRight: 44 }}
                type={showPass ? "text" : "password"} placeholder="Sua senha"
                value={password}
                onChange={e => { setPassword(e.target.value); setError(""); }}
                onKeyDown={e => e.key === "Enter" && submit()} />
              <button onClick={() => setShowPass(p => !p)} style={{
                position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)",
                background: "none", border: "none", cursor: "pointer", fontSize: 16,
              }}>{showPass ? "🙈" : "👁"}</button>
            </div>
          </div>

          {error && (
            <div style={{
              background: "rgba(248,113,113,0.12)", border: "1px solid rgba(248,113,113,0.35)",
              borderRadius: 10, padding: "10px 14px", fontSize: 13, color: "#F87171",
            }}>⚠ {error}</div>
          )}

          <button onClick={submit} disabled={loading} style={{
            background: loading ? "#0891B2" : "#22D3EE", color: "#0C0F1A",
            border: "none", borderRadius: 12, padding: 14,
            fontWeight: 800, fontSize: 15, cursor: loading ? "not-allowed" : "pointer",
            fontFamily: "inherit", marginTop: 4,
          }}>{loading ? "Entrando..." : "Entrar →"}</button>
        </div>
      </div>

      <p style={{ textAlign: "center", color: "#475569", fontSize: 13, marginTop: 20 }}>
        Não tem conta?{" "}
        <span onClick={onGoRegister} style={{ color: "#22D3EE", cursor: "pointer", fontWeight: 700 }}>
          Criar conta grátis
        </span>
      </p>
    </div>
  );
}

// ─── REGISTER FORM ────────────────────────────────────────────────────────────

function RegisterForm({ clients, onDone, onGoLogin }) {
  const [step, setStep]           = useState(1);
  const [errors, setErrors]       = useState({});
  const [cepStatus, setCepStatus] = useState("idle");
  const [showPass, setShowPass]   = useState(false);
  const [showConf, setShowConf]   = useState(false);
  const [form, setForm] = useState({
    name: "", cpf: "", phone: "", email: "", password: "", confirmPassword: "",
    cep: "", street: "", number: "", complement: "", neighborhood: "", city: "", state: "",
  });

  function set(f, v) { setForm(p => ({ ...p, [f]: v })); setErrors(p => ({ ...p, [f]: "" })); }

  function pwStrength(p) {
    let s = 0;
    if (p.length >= 8) s++;
    if (/[A-Z]/.test(p)) s++;
    if (/[0-9]/.test(p)) s++;
    if (/[^A-Za-z0-9]/.test(p)) s++;
    return s;
  }

  function validateStep1() {
    const e = {};
    if (!form.name.trim() || form.name.trim().split(" ").length < 2) e.name = "Digite nome completo";
    if (!validCPF(form.cpf)) e.cpf = "CPF inválido";
    else if ((clients || []).some(c => c.cpf === form.cpf)) e.cpf = "CPF já cadastrado";
    if (form.phone.replace(/\D/g, "").length < 11) e.phone = "Celular inválido";
    if (!validEmail(form.email)) e.email = "E-mail inválido";
    else if ((clients || []).some(c => c.email.toLowerCase() === form.email.toLowerCase())) e.email = "E-mail já cadastrado";
    if (form.password.length < 6) e.password = "Mínimo 6 caracteres";
    if (form.password !== form.confirmPassword) e.confirmPassword = "As senhas não coincidem";
    setErrors(e);
    return Object.keys(e).length === 0;
  }

  function validateStep2() {
    const e = {};
    if (form.cep.replace(/\D/g, "").length < 8) e.cep = "CEP inválido";
    if (!form.street.trim()) e.street = "Informe a rua";
    if (!form.number.trim()) e.number = "Informe o número";
    if (!form.neighborhood.trim()) e.neighborhood = "Informe o bairro";
    if (!form.city.trim()) e.city = "Informe a cidade";
    if (!form.state.trim()) e.state = "Informe o estado";
    setErrors(e);
    return Object.keys(e).length === 0;
  }

  async function fetchCEP(cep) {
    const raw = cep.replace(/\D/g, "");
    if (raw.length !== 8) { setCepStatus("idle"); return; }
    setCepStatus("loading");
    const endpoints = [
      () => fetch(`https://viacep.com.br/ws/${raw}/json/`).then(r => r.json()).then(d => {
        if (d.erro) throw new Error("not_found");
        return { street: d.logradouro, neighborhood: d.bairro, city: d.localidade, state: d.uf };
      }),
      () => fetch(`https://brasilapi.com.br/api/cep/v2/${raw}`).then(r => r.json()).then(d => {
        if (!d.city) throw new Error("not_found");
        return { street: d.street, neighborhood: d.neighborhood, city: d.city, state: d.state };
      }),
      () => fetch(`https://brasilapi.com.br/api/cep/v1/${raw}`).then(r => r.json()).then(d => {
        if (!d.city) throw new Error("not_found");
        return { street: d.street, neighborhood: d.neighborhood, city: d.city, state: d.state };
      }),
    ];
    for (const attempt of endpoints) {
      try {
        const addr = await attempt();
        setForm(p => ({
          ...p,
          street:       addr.street       || p.street,
          neighborhood: addr.neighborhood || p.neighborhood,
          city:         addr.city         || p.city,
          state:        addr.state        || p.state,
        }));
        setCepStatus("success");
        setErrors(p => ({ ...p, cep: "" }));

      } catch {}

    setCepStatus("error");
    setErrors(p => ({ ...p, cep: "CEP não encontrado. Preencha manualmente." }));

  const inp = (field) => ({
    width: "100%", padding: "12px 14px", borderRadius: 10, boxSizing: "border-box",
    border: `1.5px solid ${errors[field] ? "#F87171" : "rgba(255,255,255,0.15)"}`,
    background: "rgba(255,255,255,0.07)", color: "#fff",
    fontSize: 14, fontFamily: "inherit", outline: "none",

  const autoInp = (field) => ({
    ...inp(field),
    borderColor: cepStatus === "success" && form[field] ? "#10B98166" : errors[field] ? "#F87171" : "rgba(255,255,255,0.15)",
  });
  const lbl = { fontSize: 11, fontWeight: 700, color: "#64748B", letterSpacing: 0.5, display: "block", marginBottom: 4 };
  const errStyle = { fontSize: 11, color: "#F87171", marginTop: 3 };

  return (
    <div style={{
      minHeight: "100vh", background: "linear-gradient(135deg,#0C0F1A 0%,#0E2440 100%)",
      display: "flex", flexDirection: "column", alignItems: "center",
      padding: "40px 20px", fontFamily: "'Syne',sans-serif",
    }}>
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div style={{ fontSize: 36, marginBottom: 6 }}>👟✨</div>
        <h1 style={{ fontSize: 30, fontWeight: 800, color: "#fff", margin: 0, letterSpacing: -1 }}>
          <span style={{ color: "#22D3EE" }}>Magyk</span>Clean
        </h1>
      </div>

      {step < 3 && (
        <div style={{ width: "100%", maxWidth: 460 }}>
          {/* Step indicator */}
          <div style={{ display: "flex", alignItems: "center", marginBottom: 24 }}>
            {[1, 2].map((s, i) => (
              <div key={s} style={{ display: "flex", alignItems: "center", flex: i === 0 ? 1 : "unset" }}>
                <div style={{
                  width: 32, height: 32, borderRadius: "50%", flexShrink: 0,
                  background: step >= s ? "#22D3EE" : "rgba(255,255,255,0.1)",
                  color: step >= s ? "#0C0F1A" : "#64748B",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontWeight: 800, fontSize: 13,
                }}>{step > s ? "✓" : s}</div>
                {i === 0 && <div style={{ flex: 1, height: 2, margin: "0 8px", background: step > 1 ? "#22D3EE" : "rgba(255,255,255,0.1)" }} />}
              </div>

            <span style={{ fontSize: 12, color: "#94A3B8", fontWeight: 600, marginLeft: 12 }}>
              {step === 1 ? "Dados Pessoais" : "Endereço"}
            </span>
          </div>

          <div style={{
            background: "rgba(255,255,255,0.05)", backdropFilter: "blur(10px)",
            borderRadius: 24, padding: 28, border: "1px solid rgba(255,255,255,0.1)",

            {step === 1 && (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>

                  <h2 style={{ color: "#fff", fontSize: 20, fontWeight: 800, margin: "0 0 4px" }}>Criar sua conta</h2>

                <div>

                </div>
                <div>

                <div>

                <div>
                  <label style={lbl}>CONFIRMAR SENHA</label>

                </div>
                <div>
                  <label style={lbl}>CEP</label>
                  <div style={{ position: "relative" }}>
                    <input
                      style={{ ...inp("cep"), paddingRight: 44, borderColor: cepStatus === "success" ? "#10B98166" : cepStatus === "error" ? "#F87171" : errors.cep ? "#F87171" : "rgba(255,255,255,0.15)" }}
                      placeholder="00000-000" maxLength={9}
                      value={form.cep}
                      onChange={e => { const v = fmtCEP(e.target.value); set("cep", v); fetchCEP(v); }}
                    />
                    <div style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", fontSize: 14 }}>
                      {cepStatus === "loading" && <span style={{ color: "#94A3B8" }}>⏳</span>}
                      {cepStatus === "success" && <span style={{ color: "#10B981" }}>✓</span>}
                      {cepStatus === "error"   && <span style={{ color: "#F87171" }}>✕</span>}
                    </div>
                  </div>
                  {cepStatus === "loading" && <div style={{ fontSize: 11, color: "#22D3EE", marginTop: 4 }}>🔍 Buscando endereço...</div>}
                  {cepStatus === "success" && <div style={{ fontSize: 11, color: "#10B981", marginTop: 4 }}>✅ Endereço encontrado!</div>}
                  {errors.cep && <div style={errStyle}>⚠ {errors.cep}</div>}
                  {cepStatus === "idle" && !errors.cep && <div style={{ fontSize: 11, color: "#475569", marginTop: 3 }}>Digite o CEP para preenchimento automático</div>}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 90px", gap: 10 }}>
                  <div>
                    <label style={lbl}>RUA {cepStatus === "success" && form.street && <span style={{ color: "#10B981", fontSize: 10 }}>✓ auto</span>}</label>
                    <input style={autoInp("street")} placeholder="Rua das Flores"

                    {errors.street && <div style={errStyle}>⚠ {errors.street}</div>}
                  </div>
                  <div>
                    <label style={lbl}>NÚMERO</label>
                    <input style={inp("number")} placeholder="123"

                  </div>

                <div>

                <div>
                  <label style={lbl}>BAIRRO {cepStatus === "success" && form.neighborhood && <span style={{ color: "#10B981", fontSize: 10 }}>✓ auto</span>}</label>
                  <input style={autoInp("neighborhood")} placeholder="Centro"
                    value={form.neighborhood} onChange={e => set("neighborhood", e.target.value)} />
                  {errors.neighborhood && <div style={errStyle}>⚠ {errors.neighborhood}</div>}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 70px", gap: 10 }}>
                  <div>
                    <label style={lbl}>CIDADE {cepStatus === "success" && form.city && <span style={{ color: "#10B981", fontSize: 10 }}>✓ auto</span>}</label>
                    <input style={autoInp("city")} placeholder="São Paulo"
                      value={form.city} onChange={e => set("city", e.target.value)} />
                    {errors.city && <div style={errStyle}>⚠ {errors.city}</div>}
                  </div>
                  <div>
                    <label style={lbl}>UF {cepStatus === "success" && form.state && <span style={{ color: "#10B981", fontSize: 10 }}>✓</span>}</label>
                    <input style={autoInp("state")} placeholder="SP" maxLength={2}
                      value={form.state} onChange={e => set("state", e.target.value.toUpperCase().slice(0,2))} />
                    {errors.state && <div style={errStyle}>⚠ {errors.state}</div>}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                  <button onClick={() => setStep(1)} style={{
                    flex: 1, background: "rgba(255,255,255,0.08)", color: "#94A3B8",
                    border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12,
                    padding: 14, fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: "inherit",
                  }}>← Voltar</button>
                  <button onClick={() => validateStep2() && setStep(3)} style={{
                    flex: 2, background: "#22D3EE", color: "#0C0F1A", border: "none", borderRadius: 12,
                    padding: 14, fontWeight: 800, fontSize: 15, cursor: "pointer", fontFamily: "inherit",
                  }}>Criar Conta 🎉</button>
                </div>
              </div>
            )}
          </div>

          <p style={{ textAlign: "center", color: "#475569", fontSize: 12, marginTop: 16 }}>
            Já tem conta?{" "}
            <span onClick={onGoLogin} style={{ color: "#22D3EE", cursor: "pointer", fontWeight: 700 }}>Fazer login</span>
          </p>
        </div>
      )}

      {step === 3 && (
        <div style={{
          background: "rgba(255,255,255,0.05)", backdropFilter: "blur(10px)",
          borderRadius: 24, padding: 36, width: "100%", maxWidth: 420,
          border: "1px solid rgba(255,255,255,0.1)", textAlign: "center",
        }}>
          <div style={{ fontSize: 56, marginBottom: 14 }}>🎉</div>
          <h2 style={{ color: "#fff", fontSize: 22, fontWeight: 800, margin: "0 0 6px" }}>Conta criada!</h2>
          <p style={{ color: "#94A3B8", fontSize: 14, margin: "0 0 6px" }}>
            Bem-vindo(a), <strong style={{ color: "#22D3EE" }}>{form.name.split(" ")[0]}</strong>!
          </p>
          <p style={{ color: "#64748B", fontSize: 13, margin: "0 0 24px" }}>Seu cadastro foi concluído com sucesso.</p>
          <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 14, padding: 18, marginBottom: 24, textAlign: "left" }}>
            {[["👤","Nome",form.name],["📄","CPF",form.cpf],["📱","Celular",form.phone],["✉️","E-mail",form.email],["📍","Endereço",`${form.street}, ${form.number}${form.complement ? ` - ${form.complement}` : ""}`],["🏙","Cidade",`${form.city} - ${form.state}`]].map(([icon,label,val]) => (

            ))}
          </div>
          <button onClick={() => onDone(form)} style={{
            width: "100%", background: "#22D3EE", color: "#0C0F1A", border: "none",
            borderRadius: 12, padding: 14, fontWeight: 800, fontSize: 15, cursor: "pointer", fontFamily: "inherit",
          }}>Ir para o Login →</button>
        </div>
      )}
    </div>
  );
}

// ─── CLIENT AREA ─────────────────────────────────────────────────────────────

function ClientArea({ client, orders, setOrders, onLogout }) {
  const [tab, setTab]               = useState("pedidos"); // pedidos | solicitar
  const [selected, setSelected]     = useState(null);
  const [selServices, setSelServices] = useState([]);
  const [sneakers, setSneakers]     = useState("");
  const [brand, setBrand]           = useState("");
  const [notes, setNotes]           = useState("");
  const [payment, setPayment]       = useState("");
  const [photoData, setPhotoData]   = useState(null);
  const [submitted, setSubmitted]   = useState(false);
  const [formErr, setFormErr]       = useState("");
  const [ratings, setRatings]       = useState({}); // orderId -> {stars, comment, submitted}
  const [osOrderClient, setOsOrderClient] = useState(null);
  const [pixData, setPixData]       = useState(null);   // { qrcode, copy_and_paste, transaction_id, orderId }
  const [pixStatus, setPixStatus]   = useState("idle"); // idle | loading | waiting | paid | error
  const [pixError, setPixError]     = useState("");
  const [currentOrder, setCurrentOrder] = useState(null);

  const myOrders = orders.filter(o => o.cpf === client.cpf);
  const STEPS = ["aguardando_coleta","coletado","em_lavagem","pronto","saiu_entrega","entregue"];

  const totalSelected = selServices.reduce((s, id) => {
    const svc = SERVICES.find(x => x.id === id);
    return s + (svc ? svc.price : 0);
  }, 0);

  function toggleService(id) {
    setSelServices(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
    setFormErr("");
  }

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setPhotoData(ev.target.result);
    reader.readAsDataURL(file);
  }

  function buildOrder(id) {
    const serviceNames = selServices.map(sid => SERVICES.find(s => s.id === sid)?.name).join(", ");
    return {
      id,
      cpf: client.cpf,
      client: client.name,
      phone: client.phone,
      email: client.email,
      address: `${client.street}, ${client.number}${client.complement ? " - " + client.complement : ""} - ${client.neighborhood}, ${client.city}/${client.state}`,
      sneakers: `${brand} ${sneakers}`,
      qty: 1,
      services: selServices,
      service: selServices[0],
      status: "aguardando_aprovacao",
      price: totalSelected,
      pickupDate: "",
      deliveryDate: "",
      notes: notes.trim(),
      payment,
      photo: photoData,
      requestedAt: new Date().toISOString(),
      serviceNames,
      paid: false,
    };
  }

  function resetForm() {
    setSelServices([]); setSneakers(""); setBrand(""); setNotes(""); setPayment(""); setPhotoData(null);
  }

  async function submitRequest() {
    if (!sneakers.trim())         { setFormErr("Informe o modelo do tênis."); return; }
    if (!brand.trim())            { setFormErr("Informe a marca do tênis."); return; }
    if (!photoData)               { setFormErr("Anexe uma foto do tênis."); return; }
    if (selServices.length === 0) { setFormErr("Selecione ao menos um serviço."); return; }
    if (!payment)                 { setFormErr("Selecione a forma de pagamento."); return; }

    const order = buildOrder(genId());

    if (payment === "pix") {
      if (!BACKEND_READY) { setFormErr("PIX ainda não disponível. Escolha outra forma de pagamento."); return; }
      setPixStatus("loading");
      setPixError("");
      setCurrentOrder(order);
      setOrders(prev => [order, ...prev]);
      setSubmitted(true);
      resetForm();
      try {
        const pix = await spCreatePix(order, client);
        if (!pix || !pix.qrcode) throw new Error(pix?.error || "Resposta inválida do gateway.");
        setPixData({
          qrcode:         pix.qrcode,
          copy_and_paste: pix.copy_and_paste,
          transaction_id: pix.transaction_id,
          orderId:        order.id,
        });
        setPixStatus("waiting");
        startPixPolling(pix.transaction_id, order.id);
      } catch(e) {
        // Se CORS ou erro de rede, mostra mensagem clara
        const msg = e.message?.includes("Failed to fetch") || e.message?.includes("NetworkError")
          ? "Erro de conexão com o gateway. Verifique se a API permite chamadas do navegador (CORS)."
          : (e.message || "Erro ao gerar PIX. Tente novamente.");
        setPixStatus("error");
        setPixError(msg);
      }
    } else {
      setOrders(prev => [order, ...prev]);
      setSubmitted(true);
      resetForm();
    }
  }

  function startPixPolling(transactionId, orderId) {
    let attempts = 0;
    const maxAttempts = 72;
    let isPaid = false;
    const interval = setInterval(async () => {
      attempts++;
      try {
        const data = await spCheckPix(transactionId);
        if (data.status === "paid" && !isPaid) {
          isPaid = true;
          clearInterval(interval);
          setPixStatus("paid");
          setOrders(prev => prev.map(o => o.id === orderId ? { ...o, paid: true } : o));
        }
      } catch(e) { /* silent — CORS ou rede */ }
      if (attempts >= maxAttempts && !isPaid) {
        clearInterval(interval);
        setPixStatus("expired");
      }
    }, 5000);
  }

  function StepBar({ status }) {
    const activeSteps = ["aguardando_coleta","coletado","em_lavagem","pronto","saiu_entrega","entregue"];
    if (status === "aguardando_aprovacao") {
      return (
        <div style={{ background: "rgba(236,72,153,0.12)", border: "1px solid rgba(236,72,153,0.3)", borderRadius: 10, padding: "10px 14px", marginTop: 14, fontSize: 13, color: "#F9A8D4" }}>
          ⏳ Seu pedido está aguardando aprovação do atendente. Em breve entraremos em contato!
        </div>
      );
    }
    const idx = activeSteps.indexOf(status);
    return (
      <div style={{ display: "flex", alignItems: "center", marginTop: 14 }}>
        {activeSteps.map((s, i) => {
          const cfg = STATUS_CONFIG[s];
          const done = i <= idx;
          return (
            <div key={s} style={{ display: "flex", alignItems: "center", flex: i < activeSteps.length - 1 ? 1 : "unset" }}>
              <div style={{
                width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
                border: `2px solid ${done ? cfg.color : "rgba(255,255,255,0.15)"}`,
                background: i === idx ? cfg.color : done ? cfg.bg + "33" : "transparent",
                display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11,
              }}>{done ? cfg.icon : ""}</div>
              {i < activeSteps.length - 1 && (
                <div style={{ flex: 1, height: 2, background: done && i < idx ? cfg.color : "rgba(255,255,255,0.1)" }} />
              )}
            </div>
          );
        })}
      </div>
    );
  }

  return (
    <div style={{
      minHeight: "100vh", background: "linear-gradient(135deg,#0C0F1A 0%,#0E2440 100%)",
      display: "flex", flexDirection: "column", alignItems: "center",
      padding: "40px 20px", fontFamily: "'Syne',sans-serif",
    }}>
      {osOrderClient && <OSModal order={osOrderClient} onClose={() => setOsOrderClient(null)} />}
      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 24, width: "100%", maxWidth: 520 }}>
        <div style={{ fontSize: 36, marginBottom: 6 }}>👟✨</div>
        <h1 style={{ fontSize: 30, fontWeight: 800, color: "#fff", margin: 0, letterSpacing: -1 }}>
          <span style={{ color: "#22D3EE" }}>Magyk</span>Clean
        </h1>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginTop: 14 }}>
          <div style={{ background: "rgba(34,211,238,0.15)", border: "1px solid rgba(34,211,238,0.3)", borderRadius: 20, padding: "6px 14px", display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 22, height: 22, borderRadius: "50%", background: "#22D3EE", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11 }}>👤</div>
            <span style={{ color: "#22D3EE", fontWeight: 700, fontSize: 13 }}>{client.name.split(" ")[0]}</span>
          </div>
          <button onClick={onLogout} style={{ background: "rgba(255,255,255,0.08)", color: "#64748B", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 20, padding: "6px 14px", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Sair</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 8, marginBottom: 24, background: "rgba(255,255,255,0.06)", borderRadius: 14, padding: 6, width: "100%", maxWidth: 520 }}>

          <button key={t} onClick={() => { setTab(t); setSubmitted(false); }} style={{
            flex: 1, padding: "10px 0", borderRadius: 10, border: "none", cursor: "pointer",
            background: tab === t ? "#22D3EE" : "transparent",
            color: tab === t ? "#0C0F1A" : "#94A3B8",
            fontWeight: 700, fontSize: 13, fontFamily: "inherit", transition: "all .15s",
          }}>{l}</button>
        ))}
      </div>

      <div style={{ width: "100%", maxWidth: 520 }}>

        {/* TAB: MEUS PEDIDOS */}
        {tab === "pedidos" && (
          <div>
            {myOrders.length === 0 ? (
              <div style={{ textAlign: "center", padding: "48px 20px" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>👟</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>Nenhum pedido ainda</div>
                <div style={{ fontSize: 13, color: "#64748B", marginTop: 6 }}>Solicite seu primeiro serviço na aba ao lado!</div>
                <button onClick={() => setTab("solicitar")} style={{ marginTop: 16, background: "#22D3EE", color: "#0C0F1A", border: "none", borderRadius: 12, padding: "10px 24px", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>➕ Solicitar Serviço</button>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {myOrders.map(o => (
                  <div key={o.id}
                    onClick={() => setSelected(selected?.id === o.id ? null : o)}
                    style={{ background: "rgba(255,255,255,0.06)", borderRadius: 18, padding: 20, cursor: "pointer", border: selected?.id === o.id ? "1.5px solid #22D3EE" : "1px solid rgba(255,255,255,0.1)" }}
                  >
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 15, color: "#fff" }}>{o.sneakers}</div>
                        <div style={{ fontSize: 12, color: "#64748B", marginTop: 2 }}>{o.id}</div>
                        {o.serviceNames && <div style={{ fontSize: 11, color: "#94A3B8", marginTop: 3 }}>{o.serviceNames}</div>}
                      </div>
                      <StatusBadge status={o.status} />
                    </div>
                    {selected?.id === o.id && (
                      <div style={{ marginTop: 12 }}>
                        <StepBar status={o.status} />
                        <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 6 }}>
                          {[
                            ["💰 Total", `R$ ${Number(o.price).toFixed(2)}`],
                            ...(o.pickupDate ? [["📅 Coleta", o.pickupDate]] : []),
                            ...(o.deliveryDate ? [["🚚 Entrega prevista", o.deliveryDate]] : []),
                          ].map(([k, v]) => (
                            <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                              <span style={{ color: "#94A3B8" }}>{k}</span>
                              <span style={{ color: "#fff", fontWeight: 600 }}>{v}</span>
                            </div>
                          ))}
                          {o.notes && <div style={{ background: "rgba(245,158,11,0.15)", borderRadius: 8, padding: 8, fontSize: 12, color: "#FCD34D", marginTop: 4 }}>📝 {o.notes}</div>}
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* TAB: SOLICITAR SERVIÇO */}
        {tab === "historico" && (
          <div>
            {myOrders.length === 0 ? (
              <div style={{ textAlign: "center", padding: "48px 20px" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>📖</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>Nenhum histórico ainda</div>
                <div style={{ fontSize: 13, color: "#64748B", marginTop: 4 }}>Seu histórico de serviços aparecerá aqui</div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {myOrders.map(o => {
                  const r = ratings[o.id] || {};
                  const payLabel = {pix:"PIX",credito:"Crédito",debito:"Débito",dinheiro:"Dinheiro"}[o.payment] || "";
                  return (
                    <div key={o.id} style={{ background: "rgba(255,255,255,0.06)", borderRadius: 18, padding: 20, border: "1px solid rgba(255,255,255,0.1)" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                        <div>
                          <div style={{ fontWeight: 800, fontSize: 16, color: "#fff" }}>{o.sneakers}</div>
                          <div style={{ fontSize: 12, color: "#64748B", marginTop: 2 }}>{o.id} · {o.requestedAt ? new Date(o.requestedAt).toLocaleDateString("pt-BR") : ""}</div>
                        </div>
                        <StatusBadge status={o.status} />
                      </div>
                      {o.serviceNames && (
                        <div style={{ background: "rgba(34,211,238,0.08)", borderRadius: 10, padding: "8px 12px", marginBottom: 10 }}>
                          <div style={{ fontSize: 11, color: "#22D3EE", fontWeight: 700, marginBottom: 4 }}>SERVIÇOS</div>
                          <div style={{ fontSize: 13, color: "#CBD5E1" }}>{o.serviceNames}</div>
                        </div>
                      )}
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 8 }}>
                        <span style={{ color: "#64748B" }}>💰 Total</span>
                        <span style={{ color: "#22D3EE", fontWeight: 800 }}>R$ {Number(o.price).toFixed(2)}</span>
                      </div>
                      {payLabel && (
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 10 }}>
                          <span style={{ color: "#64748B" }}>💳 Pagamento</span>
                          <span style={{ color: "#fff", fontWeight: 600 }}>{payLabel}</span>
                        </div>
                      )}

                        <img src={o.photo} alt="Tênis" style={{ width: "100%", borderRadius: 10, maxHeight: 140, objectFit: "cover", marginBottom: 10, border: "1px solid rgba(255,255,255,0.1)" }} />
                      )}
                      <div style={{ borderTop: "1px solid rgba(255,255,255,0.08)", paddingTop: 10, marginTop: 10 }}>
                        {o.paid ? (
                          <button onClick={() => setOsOrderClient(o)} style={{ width: "100%", background: "rgba(34,211,238,0.1)", color: "#22D3EE", border: "1px solid rgba(34,211,238,0.3)", borderRadius: 10, padding: "9px 0", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "inherit", marginBottom: 8 }}>
                            🖨 Gerar Ordem de Serviço
                          </button>
                        ) : (
                          <div style={{ width: "100%", background: "rgba(248,113,113,0.08)", border: "1px solid rgba(248,113,113,0.2)", borderRadius: 10, padding: "9px 0", fontWeight: 700, fontSize: 13, textAlign: "center", color: "#F87171", marginBottom: 8, boxSizing: "border-box" }}>
                            🔒 OS disponível após confirmação do pagamento
                          </div>
                        )}
                      </div>
                      {o.status === "entregue" && (
                        <div style={{ borderTop: "1px solid rgba(255,255,255,0.08)", paddingTop: 12 }}>
                          {r.submitted ? (
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <div style={{ display: "flex", gap: 3 }}>
                                {[1,2,3,4,5].map(s => <span key={s} style={{ fontSize: 18, opacity: s <= r.stars ? 1 : 0.25 }}>⭐</span>)}
                              </div>
                              <span style={{ fontSize: 12, color: "#10B981", fontWeight: 700 }}>Avaliação enviada!</span>
                            </div>
                          ) : (
                            <div>
                              <div style={{ fontSize: 12, color: "#94A3B8", fontWeight: 700, marginBottom: 8 }}>AVALIE ESTE SERVIÇO</div>
                              <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
                                {[1,2,3,4,5].map(s => (
                                  <button key={s} onClick={() => setRatings(prev => ({...prev, [o.id]: {...(prev[o.id]||{}), stars: s}}))} style={{
                                    fontSize: 24, background: "none", border: "none", cursor: "pointer", padding: 0,
                                    opacity: (r.stars||0) >= s ? 1 : 0.25, transition: "opacity .1s",
                                  }}>⭐</button>
                                ))}
                              </div>
                              {r.stars && (
                                <>
                                  <input placeholder="Deixe um comentário (opcional)..." value={r.comment||""} onChange={e => setRatings(prev => ({...prev, [o.id]: {...(prev[o.id]||{}), comment: e.target.value}}))}
                                    style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: "1.5px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.07)", color: "#fff", fontSize: 13, fontFamily: "inherit", boxSizing: "border-box", outline: "none", marginBottom: 8 }} />
                                  <button onClick={() => setRatings(prev => ({...prev, [o.id]: {...(prev[o.id]||{}), submitted: true}}))} style={{
                                    background: "#22D3EE", color: "#0C0F1A", border: "none", borderRadius: 10,
                                    padding: "9px 20px", fontWeight: 800, fontSize: 13, cursor: "pointer", fontFamily: "inherit",
                                  }}>Enviar Avaliação ⭐</button>
                                </>
                              )}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {tab === "solicitar" && (
          <div>
            {submitted ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {/* PIX loading */}
                {pixStatus === "loading" && (
                  <div style={{ textAlign: "center", padding: "48px 20px" }}>
                    <div style={{ fontSize: 48, marginBottom: 16 }}>⏳</div>
                    <h2 style={{ color: "#fff", fontSize: 20, fontWeight: 800, margin: "0 0 8px" }}>Gerando PIX...</h2>
                    <p style={{ color: "#94A3B8", fontSize: 14 }}>Conectando ao gateway de pagamento</p>
                  </div>
                )}

                {/* PIX error */}
                {pixStatus === "error" && (
                  <div style={{ textAlign: "center", padding: "32px 20px" }}>
                    <div style={{ fontSize: 48, marginBottom: 12 }}>❌</div>
                    <h2 style={{ color: "#F87171", fontSize: 18, fontWeight: 800, margin: "0 0 8px" }}>Erro ao gerar PIX</h2>
                    <p style={{ color: "#94A3B8", fontSize: 13, margin: "0 0 20px" }}>{pixError}</p>
                    <button onClick={() => { setSubmitted(false); setPixStatus("idle"); }} style={{ background: "#22D3EE", color: "#0C0F1A", border: "none", borderRadius: 12, padding: "10px 24px", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>Tentar novamente</button>
                  </div>
                )}

                {/* PIX QR Code waiting */}
                {(pixStatus === "waiting" || pixStatus === "expired") && pixData && (
                  <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 20, padding: 24, border: "1px solid rgba(255,255,255,0.1)" }}>
                    <div style={{ textAlign: "center", marginBottom: 20 }}>
                      <div style={{ fontSize: 32, marginBottom: 8 }}>🔵</div>
                      <h2 style={{ color: "#fff", fontSize: 20, fontWeight: 800, margin: "0 0 4px" }}>Pague com PIX</h2>
                      <p style={{ color: "#94A3B8", fontSize: 13 }}>Escaneie o QR Code ou copie o código</p>
                    </div>
                    {/* QR Code */}
                    <div style={{ display: "flex", justifyContent: "center", marginBottom: 16 }}>
                      <div style={{ background: "#fff", borderRadius: 16, padding: 12 }}>
                        <img src={pixData.qrcode} alt="QR Code PIX" style={{ width: 200, height: 200, display: "block" }} />
                      </div>
                    </div>
                    {/* Copy & Paste */}
                    <div style={{ background: "rgba(255,255,255,0.07)", borderRadius: 12, padding: "12px 14px", marginBottom: 14 }}>
                      <div style={{ fontSize: 10, color: "#64748B", fontWeight: 700, marginBottom: 6, letterSpacing: 0.5 }}>PIX COPIA E COLA</div>
                      <div style={{ fontSize: 11, color: "#94A3B8", wordBreak: "break-all", marginBottom: 8 }}>{pixData.copy_and_paste}</div>
                      <button onClick={() => navigator.clipboard.writeText(pixData.copy_and_paste)} style={{ background: "#22D3EE", color: "#0C0F1A", border: "none", borderRadius: 8, padding: "7px 16px", fontWeight: 800, fontSize: 12, cursor: "pointer", fontFamily: "inherit", width: "100%" }}>
                        📋 Copiar Código
                      </button>
                    </div>
                    {/* Status */}
                    {pixStatus === "waiting" && (
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: "rgba(34,211,238,0.08)", borderRadius: 10, padding: "10px 14px", fontSize: 13, color: "#22D3EE" }}>
                        <span style={{ animation: "spin 1s linear infinite", display: "inline-block" }}>🔄</span> Aguardando pagamento...
                      </div>
                    )}
                    {pixStatus === "expired" && (
                      <div style={{ textAlign: "center", color: "#F87171", fontSize: 13, marginTop: 8 }}>
                        ⏰ QR Code expirado. <span onClick={() => { setSubmitted(false); setPixStatus("idle"); }} style={{ textDecoration: "underline", cursor: "pointer" }}>Gerar novo pedido</span>
                      </div>
                    )}
                    <div style={{ textAlign: "center", marginTop: 10, fontSize: 12, color: "#475569" }}>
                      Valor: <strong style={{ color: "#22D3EE" }}>R$ {currentOrder ? Number(currentOrder.price).toFixed(2) : "0,00"}</strong>
                    </div>
                  </div>
                )}

                {/* PIX Pago! */}
                {pixStatus === "paid" && (
                  <div style={{ textAlign: "center", padding: "40px 20px" }}>
                    <div style={{ fontSize: 56, marginBottom: 16 }}>✅</div>
                    <h2 style={{ color: "#10B981", fontSize: 22, fontWeight: 800, margin: "0 0 8px" }}>Pagamento confirmado!</h2>
                    <p style={{ color: "#94A3B8", fontSize: 14, margin: "0 0 24px" }}>PIX recebido com sucesso. Seu pedido está confirmado!</p>
                    <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
                      <button onClick={() => { setSubmitted(false); setPixStatus("idle"); setPixData(null); }} style={{ background: "#22D3EE22", color: "#22D3EE", border: "1px solid #22D3EE44", borderRadius: 12, padding: "10px 20px", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>➕ Novo Pedido</button>
                      <button onClick={() => { setTab("pedidos"); setSubmitted(false); setPixStatus("idle"); }} style={{ background: "#22D3EE", color: "#0C0F1A", border: "none", borderRadius: 12, padding: "10px 20px", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>📋 Ver Pedidos</button>
                    </div>
                  </div>
                )}

                {/* Non-PIX success */}
                {pixStatus === "idle" && (
                  <div style={{ textAlign: "center", padding: "40px 20px" }}>
                    <div style={{ fontSize: 56, marginBottom: 16 }}>🎉</div>
                    <h2 style={{ color: "#fff", fontSize: 22, fontWeight: 800, margin: "0 0 8px" }}>Pedido enviado!</h2>
                    <p style={{ color: "#94A3B8", fontSize: 14, margin: "0 0 24px" }}>Seu pedido foi recebido! O pagamento será realizado na entrega.</p>
                    <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
                      <button onClick={() => { setSubmitted(false); }} style={{ background: "#22D3EE22", color: "#22D3EE", border: "1px solid #22D3EE44", borderRadius: 12, padding: "10px 20px", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>➕ Novo Pedido</button>
                      <button onClick={() => { setTab("pedidos"); setSubmitted(false); }} style={{ background: "#22D3EE", color: "#0C0F1A", border: "none", borderRadius: 12, padding: "10px 20px", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>📋 Ver Pedidos</button>
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

                {/* Tênis info */}
                <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 18, padding: 20, border: "1px solid rgba(255,255,255,0.1)" }}>
                  <h3 style={{ color: "#fff", fontSize: 15, fontWeight: 700, margin: "0 0 14px" }}>👟 Informações do Tênis</h3>
                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    <div>
                      <label style={{ fontSize: 11, fontWeight: 700, color: "#64748B", letterSpacing: 0.5, display: "block", marginBottom: 4 }}>MARCA *</label>
                      <input placeholder="Ex: Nike, Adidas, Vans..." value={brand} onChange={e => { setBrand(e.target.value); setFormErr(""); }}
                        style={{ width: "100%", padding: "11px 14px", borderRadius: 10, border: `1.5px solid ${formErr && !brand ? "#F87171" : "rgba(255,255,255,0.15)"}`, background: "rgba(255,255,255,0.07)", color: "#fff", fontSize: 14, fontFamily: "inherit", boxSizing: "border-box", outline: "none" }} />
                    </div>
                    <div>
                      <label style={{ fontSize: 11, fontWeight: 700, color: "#64748B", letterSpacing: 0.5, display: "block", marginBottom: 4 }}>MODELO *</label>
                      <input placeholder="Ex: Air Max 90, Stan Smith..." value={sneakers} onChange={e => { setSneakers(e.target.value); setFormErr(""); }}
                        style={{ width: "100%", padding: "11px 14px", borderRadius: 10, border: `1.5px solid ${formErr && !sneakers ? "#F87171" : "rgba(255,255,255,0.15)"}`, background: "rgba(255,255,255,0.07)", color: "#fff", fontSize: 14, fontFamily: "inherit", boxSizing: "border-box", outline: "none" }} />
                    </div>
                    <div>
                      <label style={{ fontSize: 11, fontWeight: 700, color: "#64748B", letterSpacing: 0.5, display: "block", marginBottom: 4 }}>OBSERVAÇÕES <span style={{ color: "#475569", fontWeight: 400 }}>(opcional)</span></label>
                      <input placeholder="Ex: manchas específicas, cor, material..." value={notes} onChange={e => setNotes(e.target.value)}
                        style={{ width: "100%", padding: "11px 14px", borderRadius: 10, border: "1.5px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.07)", color: "#fff", fontSize: 14, fontFamily: "inherit", boxSizing: "border-box", outline: "none" }} />
                    </div>
                    <div>
                      <label style={{ fontSize: 11, fontWeight: 700, color: "#64748B", letterSpacing: 0.5, display: "block", marginBottom: 4 }}>FOTO DO TÊNIS * <span style={{ color: "#475569", fontWeight: 400 }}>(obrigatória)</span></label>
                      {!photoData ? (
                        <label style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, padding: "20px", borderRadius: 12, cursor: "pointer", border: "2px dashed rgba(255,255,255,0.2)", background: "rgba(255,255,255,0.04)" }}>
                          <span style={{ fontSize: 30 }}>📷</span>
                          <span style={{ fontSize: 13, color: "#94A3B8", fontWeight: 600 }}>Tirar ou anexar foto</span>
                          <input type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{ display: "none" }} />
                        </label>
                      ) : (
                        <div style={{ position: "relative" }}>
                          <img src={photoData} alt="Tênis" style={{ width: "100%", borderRadius: 12, maxHeight: 200, objectFit: "cover", border: "1.5px solid #10B98166" }} />
                          <button onClick={() => setPhotoData(null)} style={{ position: "absolute", top: 8, right: 8, background: "rgba(0,0,0,0.65)", border: "none", borderRadius: "50%", width: 28, height: 28, color: "#fff", cursor: "pointer", fontSize: 13 }}>✕</button>
                          <div style={{ fontSize: 11, color: "#10B981", marginTop: 5 }}>✅ Foto adicionada</div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>

                {/* Services selection */}
                <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 18, padding: 20, border: "1px solid rgba(255,255,255,0.1)" }}>
                  <h3 style={{ color: "#fff", fontSize: 15, fontWeight: 700, margin: "0 0 4px" }}>🧼 Selecione os Serviços</h3>
                  <p style={{ color: "#64748B", fontSize: 12, margin: "0 0 14px" }}>Você pode selecionar mais de um serviço</p>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {SERVICES.map(svc => {
                      const sel = selServices.includes(svc.id);
                      return (
                        <div key={svc.id} onClick={() => toggleService(svc.id)} style={{
                          padding: "13px 16px", borderRadius: 12, cursor: "pointer",
                          border: `1.5px solid ${sel ? "#22D3EE" : "rgba(255,255,255,0.1)"}`,
                          background: sel ? "rgba(34,211,238,0.1)" : "rgba(255,255,255,0.03)",
                          display: "flex", justifyContent: "space-between", alignItems: "center",
                          transition: "all .15s",
                        }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <div style={{
                              width: 22, height: 22, borderRadius: 6, flexShrink: 0,
                              border: `2px solid ${sel ? "#22D3EE" : "rgba(255,255,255,0.2)"}`,
                              background: sel ? "#22D3EE" : "transparent",
                              display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12,
                            }}>{sel ? "✓" : ""}</div>
                            <div>
                              <div style={{ fontWeight: 700, color: sel ? "#fff" : "#CBD5E1", fontSize: 14 }}>{svc.icon} {svc.name}</div>
                              <div style={{ fontSize: 11, color: "#64748B" }}>{svc.desc}</div>
                            </div>
                          </div>
                          <div style={{ fontWeight: 800, color: sel ? "#22D3EE" : "#475569", fontSize: 15, flexShrink: 0, marginLeft: 8 }}>
                            R$ {svc.price.toFixed(2)}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Summary & submit */}
                {selServices.length > 0 && (
                  <div style={{ background: "rgba(34,211,238,0.08)", border: "1px solid rgba(34,211,238,0.25)", borderRadius: 16, padding: 18 }}>
                    <div style={{ fontSize: 13, color: "#94A3B8", fontWeight: 600, marginBottom: 10 }}>RESUMO DO PEDIDO</div>
                    {selServices.map(id => {
                      const svc = SERVICES.find(s => s.id === id);
                      return (
                        <div key={id} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>

    cpf: "", client: "", phone: "", address: "",

    deliveryDate: "", notes: "",
  });

  const stats = {
    total:   orders.length,
    active:  orders.filter(o => o.status !== "entregue").length,
    pronto:  orders.filter(o => o.status === "pronto").length,
    revenue: orders.filter(o => o.status === "entregue").reduce((s, o) => s + Number(o.price), 0),
  };
  const filtered = filterStatus === "todos" ? orders : orders.filter(o => o.status === filterStatus);

  function changeStatus(id, s) {
    setOrders(prev => prev.map(o => o.id === id ? { ...o, status: s } : o));
    if (selOrder?.id === id) setSelOrder(p => ({ ...p, status: s }));
  }

  function approveOrder(id) {
    setOrders(prev => prev.map(o => o.id === id ? { ...o, status: "aguardando_coleta" } : o));
    if (selOrder?.id === id) setSelOrder(p => ({ ...p, status: "aguardando_coleta" }));
  }

    setOrders(prev => prev.map(o => o.id === id ? { ...o, paid } : o));
    if (selOrder?.id === id) setSelOrder(p => ({ ...p, paid }));

                      <div key={svc.id} onClick={() => {

                        setNewOrder(p => ({ ...p, services: updated, service: updated[0] || "", price: total * p.qty }));
                      }} style={{
                        padding: "9px 12px", borderRadius: 10, cursor: "pointer",
                        border: `1.5px solid ${sel ? "#22D3EE" : "#E2E8F0"}`,

                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <div style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${sel ? "#22D3EE" : "#CBD5E1"}`, background: sel ? "#22D3EE" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#fff", flexShrink: 0 }}>{sel ? "✓" : ""}</div>
                          <div>
                            <div style={{ fontWeight: 700, fontSize: 13, color: "#0F172A" }}>{svc.icon} {svc.name}</div>
                            <div style={{ fontSize: 11, color: "#94A3B8" }}>{svc.desc}</div>

                      </div>
                    );

                </div>
                {(newOrder.services || []).length > 0 && (
                  <div style={{ marginTop: 8, padding: "8px 12px", background: "#F0FDFE", borderRadius: 8, border: "1px solid #22D3EE44", fontSize: 13, fontWeight: 700, color: "#0891B2" }}>
                    Total: R$ {(newOrder.services || []).reduce((s, id) => s + (SERVICES.find(x => x.id === id)?.price || 0), 0).toFixed(2)}
                  </div>
                )}
              </div>
              <button onClick={addOrder} style={{
                background: "#22D3EE", color: "#0C0F1A", border: "none", borderRadius: 12,
                padding: 14, fontWeight: 800, fontSize: 15, cursor: "pointer", fontFamily: "inherit", marginTop: 4,
              }}>Criar Pedido</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const ADMIN_EMAIL    = "admin@magykclean.com.br";
const ADMIN_PASSWORD = "magyk@2025";

// ─── BACKEND URL (altere para sua URL após deploy no Railway) ─────────────────
const BACKEND_URL = "https://web-production-5b0c7.up.railway.app";
// Para testar localmente: const BACKEND_URL = "http://localhost:3001";
// ✅ Backend no ar — PIX ativado!
const BACKEND_READY = true;

async function spCreatePix(order, client) {
  const res = await fetch(`${BACKEND_URL}/pix/criar`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      amount:      Number(order.price),
      name:        client.name,
      document:    client.cpf.replace(/\D/g, ""),
      email:       client.email,
      external_id: order.id,
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || "Erro ao criar cobrança PIX");
  }
  return await res.json();
}

async function spCheckPix(transactionId) {
  const res = await fetch(`${BACKEND_URL}/pix/status/${transactionId}`);
  if (!res.ok) throw new Error("Erro ao consultar status PIX");
  return await res.json();
}

function AdminLogin({ onSuccess, onBack }) {
  const [email, setEmail]       = useState("");
  const [password, setPassword] = useState("");
  const [showPass, setShowPass] = useState(false);
  const [error, setError]       = useState("");
  const [loading, setLoading]   = useState(false);

  function submit() {
    if (!email || !password) { setError("Preencha e-mail e senha."); return; }
    setLoading(true);
    setTimeout(() => {
      if (email.trim().toLowerCase() === ADMIN_EMAIL.toLowerCase() && password === ADMIN_PASSWORD) {
        onSuccess();
      } else {
        setError("Credenciais inválidas.");
        setLoading(false);
      }

          <span style={{ color: "#22D3EE" }}>Magyk</span>Clean
        </h1>
        <p style={{ color: "#475569", margin: "6px 0 0", fontSize: 13, letterSpacing: 1 }}>PAINEL ADMINISTRATIVO</p>
      </div>

      <div style={{
        background: "rgba(255,255,255,0.04)", backdropFilter: "blur(12px)",

        border: "1px solid rgba(255,255,255,0.08)",
      }}>
        <h2 style={{ color: "#fff", fontSize: 18, fontWeight: 800, margin: "0 0 4px" }}>Acesso Restrito</h2>

          </div>
          <div>
            <label style={{ fontSize: 11, fontWeight: 700, color: "#475569", letterSpacing: 0.5, display: "block", marginBottom: 4 }}>SENHA</label>
            <div style={{ position: "relative" }}>
              <input style={{ ...inp, paddingRight: 44 }}
                type={showPass ? "text" : "password"} placeholder="••••••••"
                value={password}
                onChange={e => { setPassword(e.target.value); setError(""); }}
                onKeyDown={e => e.key === "Enter" && submit()} />

    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────

function App() {
  const [area, setArea]       = useState("client"); // "client" | "admin"
  const [orders, setOrders]   = useState([]);
  const [clients, setClients] = useState([]);
  const [dbReady, setDbReady] = useState(false);

  const [adminLogged, setAdminLogged]       = useState(false);
  const [authScreen, setAuthScreen]         = useState("login");
  const [loggedClient, setLoggedClient]     = useState(null);
  const [justRegistered, setJustRegistered] = useState(false);
  const [regEmail, setRegEmail]             = useState("");

  useEffect(() => {
    async function load() {
      const savedOrders  = await dbGet("magyk:orders");
      const savedClients = await dbGet("magyk:clients");
      if (Array.isArray(savedOrders))  setOrders(savedOrders);
      if (Array.isArray(savedClients)) setClients(savedClients);
      setDbReady(true);
    }
    load();
  }, []);

  useEffect(() => {
    if (dbReady) dbSet("magyk:orders", orders);
  }, [orders, dbReady]);

  async function handleRegister(data) {
    const updated = [...(clients || []).filter(c => c.cpf !== data.cpf), data];
    setClients(updated);
    await dbSet("magyk:clients", updated);
    setRegEmail(data.email);
    setJustRegistered(true);
    setAuthScreen("login");
  }

  if (!dbReady) {
    return (
      <div style={{ height: "100vh", background: "#0C0F1A", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16, fontFamily: "sans-serif" }}>
        <div style={{ fontSize: 40 }}>👟✨</div>
        <div style={{ color: "#22D3EE", fontSize: 18, fontWeight: 700 }}>Carregando MagykClean...</div>
        <div style={{ color: "#475569", fontSize: 13 }}>Conectando ao banco de dados</div>
      </div>
    );
  }

  // ── ADMIN AREA ───────────────────────────────────────────────────────────────
  if (area === "admin") {
    if (!adminLogged) {
      return <AdminLogin onSuccess={() => setAdminLogged(true)} onBack={() => setArea("client")} />;
    }
    return (
      <div style={{ height: "100vh", display: "flex", flexDirection: "column" }}>
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
        <div style={{ background: "#060810", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 20px", borderBottom: "1px solid #1E293B" }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: "#22D3EE", letterSpacing: 0.5 }}>🔐 MagykClean Admin</span>
          <button onClick={() => { setAdminLogged(false); setArea("client"); }} style={{
            background: "rgba(255,255,255,0.06)", color: "#64748B",
            border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8,
            padding: "4px 12px", fontSize: 12, cursor: "pointer", fontFamily: "inherit",
          }}>Sair do Admin</button>
        </div>
        <div style={{ flex: 1, overflow: "auto" }}>
          <AdminPanel orders={orders} setOrders={setOrders} clients={clients} />
        </div>
      </div>
    );
  }

  // ── CLIENT AREA ──────────────────────────────────────────────────────────────
  if (loggedClient) {
    return <ClientArea client={loggedClient} orders={orders} setOrders={setOrders} onLogout={() => { setLoggedClient(null); setAuthScreen("login"); }} />;
  }
  if (authScreen === "register") {
    return <RegisterForm clients={clients} onDone={handleRegister} onGoLogin={() => { setAuthScreen("login"); setJustRegistered(false); }} />;
  }
  return (
    <LoginForm
      clients={clients}
      onSuccess={client => { setLoggedClient(client); setJustRegistered(false); }}
      onGoRegister={() => { setAuthScreen("register"); setJustRegistered(false); }}
      onGoAdmin={() => setArea("admin")}
      justRegistered={justRegistered}
      regEmail={regEmail}
    />
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
